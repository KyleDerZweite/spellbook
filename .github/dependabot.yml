version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: "UTC"
    open-pull-requests-limit: 8
    groups:
      frontend-non-major:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/spacetimedb"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: "/worker"
    schedule:
      interval: weekly
      day: monday
      time: "05:45"
      timezone: "UTC"
    open-pull-requests-limit: 5