# Keep persistent state on named volumes for cross-runtime compatibility.
# This avoids most SELinux relabel issues on Fedora while remaining portable to Ubuntu.
services:
  postgres:
    image: docker.io/postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spellbook}
      POSTGRES_USER: ${POSTGRES_USER:-spellbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spellbook} -d ${POSTGRES_DB:-spellbook}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  db-migrate:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-spellbook}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-spellbook}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.39.0
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  qdrant:
    image: docker.io/qdrant/qdrant:v1.15.4
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      AGGRESSIVE_PRELOAD: ${AGGRESSIVE_PRELOAD:-true}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-daily}
      LANGUAGES: ${LANGUAGES:-en}
    depends_on:
      - meilisearch
    restart: unless-stopped

  scan-worker:
    build:
      context: ./scan-worker
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-spellbook-scans}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - minio
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-spellbook}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-spellbook}
      PUBLIC_MEILISEARCH_URL: ${PUBLIC_MEILISEARCH_URL}
      MEILISEARCH_INTERNAL_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      ZITADEL_ISSUER: ${ZITADEL_ISSUER}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_MOBILE_CLIENT_ID: ${ZITADEL_MOBILE_CLIENT_ID}
      APP_ORIGIN: ${APP_ORIGIN}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-spellbook-scans}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      SCAN_WORKER_URL: http://scan-worker:8080
    depends_on:
      - db-migrate
      - meilisearch
      - minio
      - scan-worker
    restart: unless-stopped

  newt:
    image: docker.io/fosrl/newt:latest
    container_name: spellbook-newt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}
    depends_on:
      - frontend

volumes:
  postgres_data:
  meilisearch_data:
  minio_data:
  qdrant_data:
