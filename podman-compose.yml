services:
  spacetimedb:
    image: docker.io/clockworklabs/spacetime:v2.0.5
    command: start --listen-addr 0.0.0.0:3000 --data-dir /stdb/data
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb_data:/stdb
    restart: unless-stopped

  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.39.0
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      AGGRESSIVE_PRELOAD: ${AGGRESSIVE_PRELOAD:-true}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-daily}
      LANGUAGES: ${LANGUAGES:-en}
    depends_on:
      - meilisearch
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:3000"
    environment:
      PUBLIC_MEILISEARCH_URL: http://meilisearch:7700
      PUBLIC_MEILISEARCH_SEARCH_KEY: ${MEILISEARCH_SEARCH_KEY}
      PUBLIC_SPACETIMEDB_URL: ws://spacetimedb:3000
      PUBLIC_SPACETIMEDB_MODULE: spellbook
      AUTH_SIGNING_SECRET: ${AUTH_SIGNING_SECRET}
    depends_on:
      - spacetimedb
      - meilisearch
    restart: unless-stopped

volumes:
  spacetimedb_data:
  meilisearch_data:
