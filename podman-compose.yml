services:
  spacetimedb:
    image: docker.io/clockworklabs/spacetime:v2.0.5
    command: start --listen-addr 0.0.0.0:3000 --data-dir /stdb/data
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb_data:/stdb
    restart: unless-stopped

  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.39.0
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  spacetimedb_data:
  meilisearch_data:
